---
name: lldap
services:
  lldap:
    container_name: lldap
    image: lldap/lldap:stable
    ports:
      # For LDAP, not recommended to expose, see Usage section.
      - "389:3890"
      # For LDAPS
      - "636:6360"
      # For the web front-end
      - "17170:17170"
    volumes:
      - "/srv/app-configs/lldap/data:/data"
    environment:
      - UID=1000
      - GID=1000
      - TZ=Etc/UTC
      - LLDAP_JWT_SECRET=0a6e12c01038b73696cd284973a53a42f61e252db517009ae3824a823bd7ca83
      - LLDAP_KEY_SEED=mR5xLJ44uWJi9H60/fQu
      - LLDAP_LDAP_BASE_DN=dc=hacker-haus,dc=org
      - LLDAP_LDAPS_OPTIONS__ENABLED=true
      - LLDAP_LDAPS_OPTIONS__CERT_FILE=/data/cert.pem
      - LLDAP_LDAPS_OPTIONS__KEY_FILE=/data/key.pem
