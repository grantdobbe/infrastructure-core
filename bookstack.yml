---
services:
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=https://docs.hacker-haus.org
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_USER=bookstack
      - DB_PASS=${BOOKSTACK_DB_PASS}
      - DB_DATABASE=bookstackapp
      # Authentik OIDC — fill in CLIENT_ID and CLIENT_SECRET after creating the
      # OAuth2/OIDC provider in Authentik (Application slug: bookstack)
      - AUTH_METHOD=oidc
      - OIDC_NAME=Authentik
      - OIDC_ISSUER=https://auth.hacker-haus.org/application/o/bookstack/
      - OIDC_CLIENT_ID=${BOOKSTACK_OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${BOOKSTACK_OIDC_CLIENT_SECRET}
    volumes:
      - /srv/app-configs/bookstack/app_data:/config
    ports:
      - 6875:80
    restart: unless-stopped
    depends_on:
      - bookstack_db
  
  bookstack_db:
    image: lscr.io/linuxserver/mariadb
    container_name: bookstack_db
    environment:
      - PUID=1000
      - PGID=1000
      - MYSQL_ROOT_PASSWORD=${ROOT_PASS}
      - TZ=America/Los_Angeles
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=${BOOKSTACK_DB_PASS}
    volumes:
      - /srv/app-configs/bookstack/db_data:/config
    restart: unless-stopped