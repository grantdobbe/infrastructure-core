# Radicale configuration for GTD system
# Deploy to: /srv/app-configs/radicale/config/config

[server]
hosts = 0.0.0.0:5232

[auth]
# Option 1: LDAP via Authentik
type = ldap
ldap_uri = ldap://auth.hacker-haus.org
ldap_base = ou=users,dc=hacker-haus,dc=org
ldap_reader_dn = cn=ldapservice,ou=users,dc=hacker-haus,dc=org
ldap_secret_file = /data/ldap_secret
ldap_filter = (&(objectClass=user)(cn={0}))
ldap_user_attribute = cn
cache_logins = true
cache_successful_logins_expiry = 900
cache_failed_logins_expiry = 30

[storage]
filesystem_folder = /data/collections

[rights]
# Users can only access their own collections
type = owner_only

[logging]
level = info
