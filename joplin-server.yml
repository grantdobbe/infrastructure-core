---
name: joplin-server

services:
  app:
    image: joplin/server:latest
    container_name: joplin_server
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - 22300:22300
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      APP_PORT: 22300
      APP_BASE_URL: https://joplin.hacker-haus.org/
      DB_CLIENT: pg
      POSTGRES_PASSWORD: ${PGPWD}
      POSTGRES_DATABASE: joplin
      POSTGRES_USER: joplin
      POSTGRES_PORT: 5432
      POSTGRES_HOST: db
      MAX_TIME_DRIFT: 0
      # Authentik OIDC — fill in CLIENT_ID and CLIENT_SECRET after creating the
      # OAuth2/OIDC provider in Authentik (Application slug: joplin)
      MAILER_ENABLED: 0
      SSO_ENABLED: 1
      SSO_CLIENT_ID: ${JOPLIN_SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${JOPLIN_SSO_CLIENT_SECRET}
      SSO_DISCOVERY_URL: https://auth.hacker-haus.org/application/o/joplin/.well-known/openid-configuration

  db:
    image: postgres:14
    container_name: joplin_postgres
    restart: unless-stopped
    volumes:
      - /srv/app-configs/joplin-server:/var/lib/postgresql/data
    expose:
      - 5432
    environment:
      POSTGRES_DB: joplin
      POSTGRES_USER: joplin
      POSTGRES_PASSWORD: ${PGPWD}
